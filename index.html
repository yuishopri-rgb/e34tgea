<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ミクコちゃん</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pk:#E0659A;--pkl:#F4A7C3;--pkp:#FBE8F1;--pkd:#C94F84;
  --bg:#fff;--bg2:#F8F8FB;--bg3:#EFEFF5;
  --t1:#1a1a2e;--t2:#6b7280;--t3:#9ca3af;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);
  --r:10px;--rl:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--bg3);color:var(--t1);display:flex;flex-direction:column}

/* ===== ヘッダー ===== */
.hd{
  background:var(--bg);
  padding:calc(8px + var(--safe-top)) 14px 8px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);flex-shrink:0;z-index:10;
}
.hd-icon{width:26px;height:26px;background:linear-gradient(135deg,#E0659A,#a78bfa);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.hd-ttl{font-size:15px;font-weight:700;background:linear-gradient(135deg,#E0659A,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-status{margin-left:auto;font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.dot.ok{background:#10b981}
.dot.loading{background:#f59e0b;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== ナビゲーションバー ===== */
.navbar{
  background:var(--bg);
  border-top:.5px solid var(--bd);
  display:flex;
  flex-shrink:0;z-index:20;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px calc(8px + var(--safe-bottom));
  gap:3px;cursor:pointer;border:none;background:none;
  color:var(--t3);font-size:10px;font-family:inherit;
  -webkit-appearance:none;
}
.nav-tab.active{color:var(--pk)}
.nav-tab i{font-size:20px}

/* ===== コンテンツエリア ===== */
.content{flex:1;display:flex;min-height:0;overflow:hidden;position:relative}

/* ===== アイテムパネル ===== */
.item-panel{
  flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.item-header{
  padding:8px 10px;font-size:11px;font-weight:500;color:var(--t2);
  background:var(--bg2);border-bottom:.5px solid var(--bd);
  display:flex;align-items:center;flex-shrink:0;
}
.item-count{font-size:10px;color:var(--t3);margin-left:auto}
.search-wrap{padding:6px 8px;flex-shrink:0;border-bottom:.5px solid var(--bd);position:relative}
.search-wrap input{
  width:100%;padding:7px 10px 7px 30px;font-size:13px;
  border:.5px solid var(--bd2);border-radius:20px;
  background:var(--bg2);color:var(--t1);outline:none;
  -webkit-appearance:none;
}
.search-wrap::before{content:'🔍';position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.item-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px}
.item-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(82px,1fr));
  gap:5px;
}
.ic{
  border-radius:8px;cursor:pointer;
  border:2px solid transparent;
  background:var(--bg2);
  display:flex;flex-direction:column;align-items:center;
  padding:5px 3px 3px;gap:2px;position:relative;
}
.ic.sel{border-color:var(--pk);background:var(--pkp)}
.ic img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;border-radius:5px;display:block}
.ic .nm{font-size:8px;color:var(--t2);text-align:center;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;width:100%}
.no-img{width:100%;aspect-ratio:1;background:var(--bg3);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--t3);text-align:center;padding:2px}
.bdg{position:absolute;font-size:7px;padding:1px 3px;border-radius:3px;font-weight:700;line-height:1.5}
.bs{top:2px;left:2px}.bp{top:2px;right:2px}
.bai{background:#FFE4F0;color:#B5316A}.bpm{background:#E4EEFF;color:#2A5AAF}
.bワンピース{background:#FCE4EC;color:#A01A55}
.bトップス{background:#FFECD6;color:#C05A00}
.bボトムス{background:#E8F5E9;color:#1B6B2F}
.bシューズ{background:#E8EAF6;color:#3949AB}
.bアクセサリ{background:#FFF9C4;color:#827717}
.msg{text-align:center;padding:30px 10px;color:var(--t3);font-size:12px;grid-column:1/-1}

/* ===== フローティングプレビュー ===== */
.float-prev{
  position:fixed;
  right:14px;
  bottom:calc(70px + var(--safe-bottom));
  width:90px;
  background:rgba(255,255,255,.96);
  border-radius:16px;
  border:.5px solid var(--pkl);
  box-shadow:0 4px 20px rgba(224,101,154,.25);
  z-index:50;
  overflow:hidden;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  padding:6px 4px 4px;gap:0;
}
.float-prev-lbl{font-size:9px;color:var(--pk);font-weight:700;margin-bottom:2px}
.float-prev-empty{width:80px;height:120px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t3);text-align:center;line-height:1.4}
/* 縦積み（フローティング用・小さめ） */
.fp-slot{display:flex;flex-direction:column;align-items:center;width:78px;position:relative}
.fp-slot img{object-fit:contain;display:block;width:100%;pointer-events:none}
.fp-slot.acce    img{height:28px} .fp-slot.acce    {margin-bottom:-4px;z-index:5;isolation:isolate}
.fp-slot.onepiece img{height:80px}.fp-slot.onepiece{margin-bottom:-8px;z-index:3;isolation:isolate}
.fp-slot.tops    img{height:44px} .fp-slot.tops    {margin-bottom:-6px;z-index:3;isolation:isolate}
.fp-slot.bottoms img{height:40px} .fp-slot.bottoms {margin-bottom:-6px;z-index:2;isolation:isolate}
.fp-slot.shoes   img{height:30px} .fp-slot.shoes   {z-index:4;isolation:isolate}
.fp-badge{font-size:8px;background:var(--pk);color:#fff;border-radius:20px;padding:1px 6px;margin-top:3px}

/* ===== 全画面プレビューモーダル ===== */
.prev-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(15,10,25,.92);
  display:none;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.prev-modal.open{display:flex}
.prev-modal-head{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-shrink:0;
}
.prev-modal-ttl{color:#fff;font-size:14px;font-weight:600}
.prev-modal-close{
  background:rgba(255,255,255,.15);color:#fff;border:none;
  border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;
  -webkit-appearance:none;
}
.prev-modal-body{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px}
/* 縦積み（大） */
.pm-slot{display:flex;align-items:center;gap:14px;width:100%;max-width:320px}
.pm-slot img{object-fit:contain;display:block;pointer-events:none;flex-shrink:0}
.pm-slot.acce    img{height:70px;width:auto;max-width:180px}
.pm-slot.onepiece img{height:200px;width:auto;max-width:220px}
.pm-slot.tops    img{height:120px;width:auto;max-width:200px}
.pm-slot.bottoms img{height:110px;width:auto;max-width:200px}
.pm-slot.shoes   img{height:80px;width:auto;max-width:180px}
.pm-slot-info{flex:1;min-width:0}
.pm-slot-lbl{font-size:10px;color:var(--pkl);font-weight:700}
.pm-slot-name{font-size:13px;color:#fff;line-height:1.4;word-break:break-all}
.pm-slot-code{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.pm-actions{
  display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center;flex-shrink:0;
}
.pm-actions button{
  padding:10px 18px;border-radius:24px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;-webkit-appearance:none;
}
.btn-capture{background:var(--pk);color:#fff}
.btn-rnd{background:rgba(255,255,255,.15);color:#fff}
.btn-clr{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}

/* ===== サイドドロワー（フィルター） ===== */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;left:0;top:0;bottom:0;width:min(300px,85vw);
  background:var(--bg);z-index:101;
  transform:translateX(-100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
  box-shadow:4px 0 20px rgba(0,0,0,.15);
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  padding:14px 16px;font-size:14px;font-weight:700;
  border-bottom:.5px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.drawer-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);padding:4px;-webkit-appearance:none}
.drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:14px}
.filter-sec{}
.filter-label{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{
  padding:5px 10px;font-size:11px;border-radius:20px;
  border:.5px solid var(--bd2);background:var(--bg2);color:var(--t2);
  cursor:pointer;user-select:none;white-space:nowrap;-webkit-appearance:none;
}
.chip.on{background:var(--pk);border-color:var(--pk);color:#fff;font-weight:600}
.cdots{display:flex;gap:6px;flex-wrap:wrap}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0}
.cdot.on{border-color:#333}
.drawer-footer{padding:12px 14px calc(12px + var(--safe-bottom));border-top:.5px solid var(--bd);flex-shrink:0}
.reset-btn{width:100%;padding:10px;font-size:12px;border-radius:20px;border:.5px solid var(--bd2);background:var(--bg2);color:var(--t2);cursor:pointer;-webkit-appearance:none}

/* ===== PC レイアウト ===== */
@media(min-width:700px){
  .navbar{display:none}
  .content{flex-direction:row;gap:8px;padding:8px}
  .item-panel{border-radius:var(--rl);background:var(--bg);box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .float-prev{
    position:relative;right:auto;bottom:auto;
    width:280px;flex-shrink:0;
    border-radius:var(--rl);
    box-shadow:0 1px 4px rgba(0,0,0,.07);
    cursor:default;
    padding:0;background:var(--bg);border:.5px solid var(--bd);
  }
  .fp-slot.acce    img{height:60px}
  .fp-slot.onepiece img{height:180px;}.fp-slot.onepiece{margin-bottom:-18px}
  .fp-slot.tops    img{height:100px;}.fp-slot.tops{margin-bottom:-12px}
  .fp-slot.bottoms img{height:90px;}.fp-slot.bottoms{margin-bottom:-12px}
  .fp-slot.shoes   img{height:70px}
  .fp-slot{width:160px}
  .fp-badge{display:none}
  .float-prev-empty{height:200px;width:160px}
  .pc-prev-header{display:flex}
  .pc-prev-stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;overflow-y:auto;background:linear-gradient(160deg,#fff8fc,#f0f0ff)}
  .pc-prev-actions{padding:8px;display:flex;gap:5px;justify-content:center;border-top:.5px solid var(--bd);flex-shrink:0}
}
@media(max-width:699px){
  .pc-prev-header,.pc-prev-actions{display:none}
  .pc-prev-stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px}
}

/* ===== サイドバーのタブ（PC） ===== */
.sidebar-tabs{display:none}
@media(min-width:700px){
  .sidebar-tabs{
    display:flex;gap:4px;padding:8px 10px 0;flex-shrink:0;
  }
  .stab{
    flex:1;padding:6px;font-size:11px;text-align:center;border-radius:8px;
    border:.5px solid var(--bd2);background:var(--bg2);color:var(--t2);cursor:pointer;
    -webkit-appearance:none;
  }
  .stab.on{background:var(--pk);border-color:var(--pk);color:#fff;font-weight:600}
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="hd">
  <div class="hd-icon">✦</div>
  <div class="hd-ttl">ミクコちゃん</div>
  <div class="hd-status">
    <div class="dot loading" id="load-dot"></div>
    <span id="load-txt">読み込み中...</span>
  </div>
</div>

<!-- コンテンツ -->
<div class="content">

  <!-- アイテムパネル -->
  <div class="item-panel">
    <div class="item-header">
      <span id="ptitle">アイテム一覧</span>
      <span class="item-count" id="pcnt"></span>
    </div>
    <div class="search-wrap">
      <input type="search" placeholder="コーデ名・IDで検索..." id="q" oninput="render()" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="item-scroll">
      <div class="item-grid" id="grid">
        <div class="msg">データを読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- フローティングプレビュー（スマホ: 右下固定、PC: サイドバー） -->
  <div class="float-prev" id="float-prev" onclick="openPrevModal()">
    <!-- PC用ヘッダー -->
    <div class="pc-prev-header" style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--t2);background:var(--bg2);border-bottom:.5px solid var(--bd);width:100%;display:flex;align-items:center;justify-content:space-between">
      <span>プレビュー</span>
      <button onclick="event.stopPropagation();rnd()" style="font-size:10px;padding:3px 8px;border-radius:12px;border:.5px solid var(--bd2);background:var(--bg);cursor:pointer;color:var(--t2);-webkit-appearance:none">ランダム</button>
    </div>
    <div class="pc-prev-stage" id="float-stage">
      <div class="float-prev-empty" id="float-empty">タップして<br>コーデ確認</div>
    </div>
    <!-- スマホ用バッジ -->
    <div class="fp-badge" id="fp-badge" style="display:none">タップで拡大</div>
    <!-- PC用アクション -->
    <div class="pc-prev-actions">
      <button onclick="event.stopPropagation();clr()" style="padding:6px 12px;font-size:11px;border-radius:20px;border:.5px solid var(--bd2);background:var(--bg);color:var(--t2);cursor:pointer;-webkit-appearance:none">リセット</button>
      <button onclick="event.stopPropagation();openPrevModal()" style="padding:6px 12px;font-size:11px;border-radius:20px;border:none;background:var(--pk);color:#fff;font-weight:600;cursor:pointer;-webkit-appearance:none">保存 / 出力</button>
    </div>
  </div>

</div>

<!-- ボトムナビゲーション（スマホのみ） -->
<div class="navbar">
  <button class="nav-tab active" id="nav-home" onclick="switchNav('home')">
    <i class="ti ti-shirt" aria-hidden="true"></i>
    <span>アイテム</span>
  </button>
  <button class="nav-tab" id="nav-filter" onclick="openDrawer()">
    <i class="ti ti-adjustments-horizontal" aria-hidden="true"></i>
    <span>フィルター</span>
  </button>
  <button class="nav-tab" id="nav-preview" onclick="openPrevModal()">
    <i class="ti ti-eye" aria-hidden="true"></i>
    <span>プレビュー</span>
  </button>
</div>

<!-- 全画面プレビューモーダル -->
<div class="prev-modal" id="prev-modal">
  <div class="prev-modal-head">
    <span class="prev-modal-ttl">コーデプレビュー</span>
    <button class="prev-modal-close" onclick="closePrevModal()">✕ 閉じる</button>
  </div>
  <div class="prev-modal-body" id="prev-modal-body">
    <p style="color:rgba(255,255,255,.5);font-size:13px">アイテムを選んでください</p>
  </div>
  <div class="pm-actions">
    <button class="btn-capture" onclick="captureCoord()">📸 画像を保存</button>
    <button class="btn-rnd" onclick="rnd()">ランダム ✦</button>
    <button class="btn-clr" onclick="clr();closePrevModal()">リセット</button>
  </div>
</div>

<!-- フィルタードロワー -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <span>フィルター</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="filter-sec">
      <div class="filter-label">作品</div>
      <div class="chips" id="sc">
        <div class="chip on" onclick="setSrc('all')">すべて</div>
        <div class="chip" onclick="setSrc('aipri')">アイプリ</div>
        <div class="chip" onclick="setSrc('primagi')">プリマジ</div>
      </div>
    </div>
    <div class="filter-sec">
      <div class="filter-label">シリーズ</div>
      <div class="chips" id="brand-chips"></div>
    </div>
    <div class="filter-sec">
      <div class="filter-label">パーツ</div>
      <div class="chips" id="pc">
        <div class="chip on" onclick="setPart('all')">すべて</div>
        <div class="chip" onclick="setPart('ワンピース')">ワンピ</div>
        <div class="chip" onclick="setPart('トップス')">トップス</div>
        <div class="chip" onclick="setPart('ボトムス')">ボトムス</div>
        <div class="chip" onclick="setPart('シューズ')">シューズ</div>
        <div class="chip" onclick="setPart('アクセサリ')">アクセ</div>
      </div>
    </div>
    <div class="filter-sec">
      <div class="filter-label">色</div>
      <div class="cdots">
        <div class="cdot on" id="cd-" style="background:conic-gradient(#FF8FAB,#FFD166,#A0E7E5,#C7CEEA,#fff)" onclick="setColor('')"></div>
        <div class="cdot" id="cd-ピンク"   style="background:#FF8FAB" onclick="setColor('ピンク')"></div>
        <div class="cdot" id="cd-イエロー" style="background:#FFD166" onclick="setColor('イエロー')"></div>
        <div class="cdot" id="cd-ブルー"   style="background:#7EC8E3" onclick="setColor('ブルー')"></div>
        <div class="cdot" id="cd-グリーン" style="background:#B5EAD7" onclick="setColor('グリーン')"></div>
        <div class="cdot" id="cd-パープル" style="background:#C7CEEA" onclick="setColor('パープル')"></div>
        <div class="cdot" id="cd-オレンジ" style="background:#FFB347" onclick="setColor('オレンジ')"></div>
        <div class="cdot" id="cd-ホワイト" style="background:#f0f0f0;border:.5px solid #ccc" onclick="setColor('ホワイト')"></div>
        <div class="cdot" id="cd-ブラック" style="background:#555" onclick="setColor('ブラック')"></div>
      </div>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="reset-btn" onclick="resetFilters();closeDrawer()">フィルターをリセット</button>
  </div>
</div>

<!-- Tabler Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/yuishopri-rgb/e34tgea/main/';
const MANIFEST_URL = GITHUB_RAW + 'manifest.json';

/* 色判定 */
const CK={
  'ピンク':['ピンク','ローズ','いちご','チェリー','ラズベリー','ベリー','コーラル','ハート'],
  'ブルー':['ブルー','スカイ','ネイビー','みずいろ','ソーダ','マリン','アクア'],
  'イエロー':['イエロー','ゴールド','レモン','ひまわり','サンシャイン','バナナ'],
  'グリーン':['グリーン','ミント','リーフ','モスグリーン','エメラルド','マスカット'],
  'パープル':['パープル','ラベンダー','バイオレット','ライラック','グレープ','ミッドナイト'],
  'オレンジ':['オレンジ','アンバー','ピーチ','マカロン'],
  'ホワイト':['ホワイト','ミルキー','パール','スノー','クリーム','シルバー','ウエディング','ウェディング'],
  'ブラック':['ブラック','ダーク','ゴシック','ロック'],
};
function dc(n){for(const[c,kw]of Object.entries(CK))if(kw.some(k=>n.includes(k)))return c;return 'その他';}

/* CSV */
function parseCsv(text){
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  const start=/^brand/i.test(lines[0])?1:0;
  const rows=[];
  for(const line of lines.slice(start)){
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else cur+=c;
    }
    cols.push(cur);
    if(cols.length>=5)rows.push(cols);
  }
  return rows;
}

/* 状態 */
let ALL=[],fSrc='all',fPart='all',fColor='',fBrand='all';
let coord={},brands=new Set();

/* ロード */
async function loadData(){
  const dot=document.getElementById('load-dot'),txt=document.getElementById('load-txt');
  dot.className='dot loading';
  try{
    const mRes=await fetch(MANIFEST_URL+'?t='+Date.now());
    if(!mRes.ok)throw new Error();
    const manifest=await mRes.json();
    const allFiles=[...manifest.files.aipri,...manifest.files.primagi];
    let loaded=0;
    await Promise.all(allFiles.map(async({file,label})=>{
      try{
        const res=await fetch(GITHUB_RAW+file+'?t='+Date.now());
        if(!res.ok)return;
        const rows=parseCsv(await res.text());
        const src=file.match(/AP_|OAP_|APSP_/)?'aipri':'primagi';
        const existing=new Set(ALL.map(x=>x.id));
        for(const[brand,cardId,name,part,imgUrl]of rows){
          const id=src+'_'+cardId+'_'+part;
          if(existing.has(id))continue;
          ALL.push({id,code:cardId,name,part,src,brand,img:imgUrl,color:dc(name)});
          brands.add(brand);
        }
        txt.textContent=`${++loaded}/${allFiles.length}`;
      }catch(e){}
    }));
    dot.className='dot ok';
    txt.textContent=ALL.length+'件';
    renderBrandChips();render();
  }catch(e){
    dot.className='dot';txt.textContent='エラー';
    document.getElementById('grid').innerHTML='<div class="msg">データ読み込み失敗</div>';
  }
}

/* 描画（Safari対応: rAF + イベント委譲） */
let rPending=false;
function render(){
  if(rPending)return;rPending=true;
  requestAnimationFrame(()=>{rPending=false;_render();});
}
function filtered(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  return ALL.filter(it=>{
    if(fSrc!=='all'&&it.src!==fSrc)return false;
    if(fPart!=='all'&&it.part!==fPart)return false;
    if(fColor&&it.color!==fColor)return false;
    if(fBrand!=='all'&&it.brand!==fBrand)return false;
    if(q&&!it.name.toLowerCase().includes(q)&&!it.code.toLowerCase().includes(q))return false;
    return true;
  });
}
function _render(){
  const list=filtered();
  document.getElementById('pcnt').textContent=list.length+'件';
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML=`<div class="msg">${ALL.length?'該当なし':'データ読み込み中...'}</div>`;return;}
  g.innerHTML=list.map(it=>{
    const sel=coord[it.part]&&coord[it.part].id===it.id;
    const pl=it.part==='アクセサリ'?'アクセ':it.part;
    return`<div class="ic${sel?' sel':''}" data-id="${it.id}">
      <div class="bdg bs ${it.src==='aipri'?'bai':'bpm'}">${it.src==='aipri'?'AI':'PM'}</div>
      <div class="bdg bp b${it.part}">${pl}</div>
      ${it.img?`<img src="${it.img}" alt="" loading="lazy" decoding="async">`:`<div class="no-img">${it.code}</div>`}
      <div class="nm">${it.name}</div>
    </div>`;
  }).join('');
}
document.getElementById('grid').addEventListener('click',e=>{
  const ic=e.target.closest('.ic');if(!ic)return;
  pick(ic.dataset.id);
});

/* フローティングプレビュー更新 */
const SLOT_DEFS=[
  ['アクセサリ','acce','アクセ'],
  ['ワンピース','onepiece','ワンピース'],
  ['トップス','tops','トップス'],
  ['ボトムス','bottoms','ボトムス'],
  ['シューズ','shoes','シューズ'],
];
function renderFloatPrev(){
  const stage=document.getElementById('float-stage');
  const empty=document.getElementById('float-empty');
  const badge=document.getElementById('fp-badge');
  const hasAny=Object.keys(coord).length>0;
  if(!hasAny){
    empty.style.display='flex';badge.style.display='none';
    // スマホ: 既存のfp-slotを消す
    stage.querySelectorAll('.fp-slot').forEach(e=>e.remove());
    return;
  }
  empty.style.display='none';
  // スロット再描画
  stage.querySelectorAll('.fp-slot').forEach(e=>e.remove());
  const slots=SLOT_DEFS.filter(([key])=>{
    if(key==='ワンピース')return !!coord['ワンピース'];
    if(key==='トップス')  return !coord['ワンピース']&&!!coord['トップス'];
    if(key==='ボトムス')  return !coord['ワンピース']&&!!coord['ボトムス'];
    return !!coord[key];
  });
  slots.forEach(([key,cls])=>{
    const it=coord[key];if(!it)return;
    const div=document.createElement('div');div.className=`fp-slot ${cls}`;
    const img=document.createElement('img');
    img.src=it.img||'';img.alt='';
    img.onerror=()=>{img.style.opacity='.15';};
    div.appendChild(img);
    stage.appendChild(div);
  });
  badge.style.display='block';
}

/* 全画面プレビューモーダル */
function renderPrevModal(){
  const body=document.getElementById('prev-modal-body');
  const hasAny=Object.keys(coord).length>0;
  if(!hasAny){body.innerHTML='<p style="color:rgba(255,255,255,.5);font-size:13px">アイテムを選んでください</p>';return;}
  const slots=SLOT_DEFS.filter(([key])=>{
    if(key==='ワンピース')return !!coord['ワンピース'];
    if(key==='トップス')  return !coord['ワンピース']&&!!coord['トップス'];
    if(key==='ボトムス')  return !coord['ワンピース']&&!!coord['ボトムス'];
    return !!coord[key];
  });
  body.innerHTML=slots.map(([key,cls,lbl])=>{
    const it=coord[key];if(!it)return'';
    return`<div class="pm-slot ${cls}">
      <img src="${it.img||''}" alt="" onerror="this.style.opacity='.1'">
      <div class="pm-slot-info">
        <div class="pm-slot-lbl">${lbl}</div>
        <div class="pm-slot-name">${it.name}</div>
        <div class="pm-slot-code">${it.code}</div>
      </div>
    </div>`;
  }).join('');
}
function openPrevModal(){renderPrevModal();document.getElementById('prev-modal').classList.add('open');}
function closePrevModal(){document.getElementById('prev-modal').classList.remove('open');}

/* 操作 */
function pick(id){
  const it=ALL.find(x=>x.id===id);if(!it)return;
  if(coord[it.part]&&coord[it.part].id===id)delete coord[it.part];
  else{
    if(it.part==='ワンピース'){delete coord['トップス'];delete coord['ボトムス'];}
    if(it.part==='トップス'||it.part==='ボトムス')delete coord['ワンピース'];
    coord[it.part]=it;
  }
  render();renderFloatPrev();
}
function clr(){coord={};render();renderFloatPrev();}
function rnd(){
  coord={};
  const pool=filtered().length?filtered():ALL;
  if(pool.some(x=>x.part==='ワンピース')&&Math.random()>.4){
    const c=pool.filter(x=>x.part==='ワンピース');coord['ワンピース']=c[Math.floor(Math.random()*c.length)];
  }else{
    ['トップス','ボトムス'].forEach(p=>{const c=pool.filter(x=>x.part===p);if(c.length)coord[p]=c[Math.floor(Math.random()*c.length)];});
  }
  ['シューズ','アクセサリ'].forEach(p=>{const c=pool.filter(x=>x.part===p);if(c.length)coord[p]=c[Math.floor(Math.random()*c.length)];});
  render();renderFloatPrev();renderPrevModal();
}

/* フィルター */
function renderBrandChips(){
  document.getElementById('brand-chips').innerHTML=
    `<div class="chip ${fBrand==='all'?'on':''}" onclick="setBrand('all')">すべて</div>`+
    [...brands].map(b=>`<div class="chip ${fBrand===b?'on':''}" onclick="setBrand('${b.replace(/'/g,"\\'")}')">${b}</div>`).join('');
}
function setSrc(v){fSrc=v;document.querySelectorAll('#sc .chip').forEach((c,i)=>c.classList.toggle('on',['all','aipri','primagi'][i]===v));render();}
function setPart(v){fPart=v;document.querySelectorAll('#pc .chip').forEach((c,i)=>c.classList.toggle('on',['all','ワンピース','トップス','ボトムス','シューズ','アクセサリ'][i]===v));render();}
function setBrand(v){fBrand=v;renderBrandChips();render();}
function setColor(v){
  fColor=fColor===v?'':v;
  document.querySelectorAll('.cdot').forEach(d=>{d.classList.remove('on');if(d.id==='cd-'+fColor||(fColor===''&&d.id==='cd-'))d.classList.add('on');});
  render();
}
function resetFilters(){fSrc='all';fPart='all';fColor='';fBrand='all';setSrc('all');setPart('all');setColor('');renderBrandChips();render();}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}
function switchNav(t){document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));document.getElementById('nav-'+t)?.classList.add('active');}

/* 画像キャプチャ */
const SH={acce:70,onepiece:200,tops:120,bottoms:110,shoes:80};
const SM={acce:-10,onepiece:-20,tops:-15,bottoms:-15,shoes:0};
async function captureCoord(){
  const slots=SLOT_DEFS.filter(([key])=>{
    if(key==='ワンピース')return !!coord['ワンピース'];
    if(key==='トップス')  return !coord['ワンピース']&&!!coord['トップス'];
    if(key==='ボトムス')  return !coord['ワンピース']&&!!coord['ボトムス'];
    return !!coord[key];
  });
  const W=300,SCALE=2;
  const totalH=slots.reduce((s,[k,,],i)=>s+SH[SLOT_DEFS.find(d=>d[0]===k)[1]]+(i<slots.length-1?SM[SLOT_DEFS.find(d=>d[0]===k)[1]]:0),0);
  const images=await Promise.all(slots.map(([key])=>new Promise(res=>{
    const it=coord[key];if(!it||!it.img){res(null);return;}
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>res(img);
    img.onerror=()=>{const i2=new Image();i2.onload=()=>res(i2);i2.onerror=()=>res(null);i2.src=it.img;};
    img.src=it.img+(it.img.includes('?')?'&':'?')+'t='+Date.now();
  })));
  const canvas=document.createElement('canvas');
  canvas.width=W*SCALE;canvas.height=Math.max(totalH,50)*SCALE;
  const ctx=canvas.getContext('2d');
  ctx.scale(SCALE,SCALE);
  ctx.fillStyle='#180828';ctx.fillRect(0,0,W,totalH);
  let y=0;
  slots.forEach(([key,cls],,i)=>{
    const h=SH[cls],mb=SM[cls]||0,img=images[i];
    if(img){
      const ratio=Math.min((W-4)/img.naturalWidth,h/img.naturalHeight);
      const dw=img.naturalWidth*ratio,dh=img.naturalHeight*ratio;
      ctx.drawImage(img,(W-dw)/2,y+(h-dh)/2,dw,dh);
    }
    y+=h+(i<slots.length-1?mb:0);
  });
  canvas.toBlob(async blob=>{
    if(!blob){alert('画像生成失敗');return;}
    const url=URL.createObjectURL(blob);
    if(navigator.share&&navigator.canShare){
      const f=new File([blob],'coord.png',{type:'image/png'});
      if(navigator.canShare({files:[f]})){try{await navigator.share({files:[f],title:'ミクコちゃん'});URL.revokeObjectURL(url);return;}catch(e){}}
    }
    const a=document.createElement('a');a.href=url;a.download='coord.png';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  },'image/png');
}

/* 起動 */
renderBrandChips();render();loadData();
