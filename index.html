<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ミックスコーデ作成アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk:#E0659A;--pkl:#F4A7C3;--pkp:#FBE8F1;--pkd:#C94F84;
  --bg:#fff;--bg2:#F8F8FB;--bg3:#EFEFF5;
  --t1:#1a1a2e;--t2:#6b7280;--t3:#9ca3af;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.15);
  --r:10px;--rl:14px;
}
body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--bg3);color:var(--t1);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:8px}

/* ---- ヘッダー ---- */
.hd{background:var(--bg);border-radius:var(--rl);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.hd-ttl{font-size:15px;font-weight:700;background:linear-gradient(135deg,#E0659A,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hd-sub{font-size:11px;color:var(--t3)}
.hd-status{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--t3)}
.dot.ok{background:#10b981}.dot.loading{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ---- フィルター ---- */
.flt{background:var(--bg);border-radius:var(--rl);padding:9px 13px;display:flex;flex-direction:column;gap:7px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.fr{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fl{font-size:11px;color:var(--t2);min-width:30px;font-weight:500}
.chips{display:flex;gap:3px;flex-wrap:wrap}
.chip{padding:4px 9px;font-size:11px;border-radius:20px;border:.5px solid var(--bd2);background:var(--bg);color:var(--t2);cursor:pointer;user-select:none;white-space:nowrap;transition:.1s}
.chip:hover{background:var(--bg2)}
.chip.on{background:var(--pk);border-color:var(--pk);color:#fff;font-weight:500}
.cdots{display:flex;gap:5px;align-items:center}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;transition:.1s}
.cdot.on{border-color:#222;transform:scale(1.18)}
.sb{position:relative;flex:1;min-width:130px}
.sb input{width:100%;padding:5px 9px 5px 27px;font-size:12px;border:.5px solid var(--bd2);border-radius:20px;background:var(--bg);color:var(--t1);outline:none}
.sb input:focus{border-color:var(--pkl)}
.sb::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}

/* ---- メインレイアウト ---- */
.main{display:grid;grid-template-columns:1fr 300px;gap:8px}
@media(max-width:660px){.main{grid-template-columns:1fr}}

/* ---- アイテムパネル ---- */
.pnl{background:var(--bg);border-radius:var(--rl);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;flex-direction:column}
.ph{padding:7px 11px;font-size:11px;font-weight:500;color:var(--t2);background:var(--bg2);border-bottom:.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.isc{overflow-y:auto;padding:7px;max-height:540px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}

.ic{border-radius:var(--r);cursor:pointer;border:2px solid transparent;background:var(--bg2);display:flex;flex-direction:column;align-items:center;padding:5px 4px 4px;gap:3px;position:relative;transition:.12s}
.ic:hover{border-color:var(--pkl);transform:scale(1.04)}
.ic.sel{border-color:var(--pk);background:var(--pkp)}
.ic img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;border-radius:6px}
.ic .nm{font-size:9px;color:var(--t2);text-align:center;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;width:100%}
.bdg{position:absolute;font-size:8px;padding:1px 4px;border-radius:4px;font-weight:600;line-height:1.5}
.bs{top:3px;left:3px}.bp{top:3px;right:3px}
.bai{background:#FFE4F0;color:#B5316A}.bpm{background:#E4EEFF;color:#2A5AAF}
.bワンピース{background:#FCE4EC;color:#A01A55}
.bトップス{background:#FFECD6;color:#C05A00}
.bボトムス{background:#E8F5E9;color:#1B6B2F}
.bシューズ{background:#E8EAF6;color:#3949AB}
.bアクセサリ{background:#FFF9C4;color:#827717}
.no-img{width:100%;aspect-ratio:1;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t3)}
.msg{text-align:center;padding:40px;color:var(--t3);font-size:12px;grid-column:1/-1}

/* ---- プレビューパネル ---- */
.prev-panel{background:var(--bg);border-radius:var(--rl);box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;flex-direction:column;overflow:hidden}
.ph2{padding:7px 11px;font-size:11px;font-weight:500;color:var(--t2);background:var(--bg2);border-bottom:.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.prev-stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 8px;gap:0;min-height:400px;max-height:540px;overflow-y:auto;background:linear-gradient(160deg,#fff8fc,#f0f0ff);position:relative}
.prev-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px;text-align:center;line-height:2}

/* 縦積みスロット */
.pslot{display:flex;flex-direction:column;align-items:center;position:relative;width:200px}
.pslot img{object-fit:contain;display:block;width:100%}
/* 各パーツの高さ・マージン */
.pslot.acce     {z-index:5;margin-bottom:-12px} .pslot.acce     img{height:80px}
.pslot.onepiece {z-index:3;margin-bottom:-22px} .pslot.onepiece img{height:220px}
.pslot.tops     {z-index:3;margin-bottom:-16px} .pslot.tops     img{height:130px}
.pslot.bottoms  {z-index:2;margin-bottom:-16px} .pslot.bottoms  img{height:115px}
.pslot.shoes    {z-index:4}                      .pslot.shoes    img{height:85px}
.pslot-lbl{font-size:9px;color:var(--pk);font-weight:700;margin-bottom:2px}
.pslot-name{font-size:9px;color:var(--t2);text-align:center;margin-top:4px;background:rgba(255,255,255,.85);border-radius:6px;padding:1px 6px;max-width:190px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.rm-btn{position:absolute;top:14px;right:2px;width:18px;height:18px;border-radius:50%;background:var(--pkl);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;z-index:10}
.rm-btn:hover{background:var(--pk)}
.pslot-empty{width:180px;border:1.5px dashed var(--pkl);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--pkl);font-size:10px;margin:3px 0}
.pslot-empty.acce{height:70px}.pslot-empty.onepiece{height:200px}
.pslot-empty.tops{height:115px}.pslot-empty.bottoms{height:100px}.pslot-empty.shoes{height:75px}

.pact{padding:7px 10px 9px;display:flex;gap:5px;justify-content:center;border-top:.5px solid var(--bd);flex-shrink:0}
.btn{padding:6px 13px;font-size:11px;border-radius:20px;cursor:pointer;border:.5px solid var(--bd2)}
.bo{background:var(--bg);color:var(--t2)}.bo:hover{background:var(--bg2)}
.bpr{background:var(--pk);color:#fff;border:none;font-weight:500}.bpr:hover{background:var(--pkd)}

/* ---- 保存済みコーデバー ---- */
.sv{background:var(--bg);border-radius:var(--rl);padding:7px 13px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.sc2{padding:4px 10px;font-size:11px;border-radius:20px;background:var(--bg2);border:.5px solid var(--bd);cursor:pointer;color:var(--t2)}
.sc2:hover{border-color:var(--pkl);color:var(--pk)}

/* ---- 全画面保存ポップアップ ---- */
#save-overlay{position:fixed;inset:0;background:rgba(15,10,25,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.save-header{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap;justify-content:center}
.save-header button{padding:10px 20px;border-radius:24px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.save-capture{background:var(--pk);color:#fff}
.save-capture:hover{background:var(--pkd)}
.save-close{background:rgba(255,255,255,.15);color:#fff}
.save-close:hover{background:rgba(255,255,255,.25)}
.save-toggle{display:flex;align-items:center;gap:6px;color:#fff;font-size:12px;cursor:pointer}
#popup-stage{display:flex;flex-direction:column;align-items:flex-start}
.popup-row{display:flex;align-items:center}
.popup-row img{object-fit:contain;display:block}
.popup-name{margin-left:16px;color:#fff;font-size:12px;line-height:1.5;text-shadow:0 1px 3px rgba(0,0,0,.8);min-width:120px}
.popup-name-lbl{font-size:10px;color:var(--pkl);font-weight:600}
</style>
</head>
<body>
<div class="app">

<!-- ヘッダー -->
<div class="hd">
  <div style="width:28px;height:28px;background:linear-gradient(135deg,#E0659A,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0">✦</div>
  <div class="hd-ttl">ミックスコーデ作成アプリ</div>
  <div class="hd-right">
    <div class="hd-status">
      <div class="dot" id="load-dot"></div>
      <span id="load-txt">読み込み中...</span>
    </div>
    <div class="hd-sub">アイプリ × プリマジ</div>
  </div>
</div>

<!-- フィルター -->
<div class="flt">
  <div class="fr">
    <span class="fl">作品</span>
    <div class="chips" id="sc">
      <div class="chip on" onclick="setSrc('all')">すべて</div>
      <div class="chip" onclick="setSrc('aipri')">アイプリ</div>
      <div class="chip" onclick="setSrc('primagi')">プリマジ</div>
    </div>
    <div class="sb" style="margin-left:auto">
      <input type="text" placeholder="コーデ名・カードIDで検索..." id="q" oninput="render()">
    </div>
  </div>
  <div class="fr">
    <span class="fl">シリーズ</span>
    <div class="chips" id="brand-chips"></div>
  </div>
  <div class="fr">
    <span class="fl">パーツ</span>
    <div class="chips" id="pc">
      <div class="chip on" onclick="setPart('all')">すべて</div>
      <div class="chip" onclick="setPart('ワンピース')">ワンピ</div>
      <div class="chip" onclick="setPart('トップス')">トップス</div>
      <div class="chip" onclick="setPart('ボトムス')">ボトムス</div>
      <div class="chip" onclick="setPart('シューズ')">シューズ</div>
      <div class="chip" onclick="setPart('アクセサリ')">アクセ</div>
    </div>
  </div>
  <div class="fr">
    <span class="fl">色</span>
    <div class="cdots">
      <div class="cdot on" id="cd-" style="background:conic-gradient(#FF8FAB,#FFD166,#A0E7E5,#C7CEEA,#fff)" onclick="setColor('')"></div>
      <div class="cdot" id="cd-ピンク"   style="background:#FF8FAB" onclick="setColor('ピンク')"></div>
      <div class="cdot" id="cd-イエロー" style="background:#FFD166" onclick="setColor('イエロー')"></div>
      <div class="cdot" id="cd-ブルー"   style="background:#7EC8E3" onclick="setColor('ブルー')"></div>
      <div class="cdot" id="cd-グリーン" style="background:#B5EAD7" onclick="setColor('グリーン')"></div>
      <div class="cdot" id="cd-パープル" style="background:#C7CEEA" onclick="setColor('パープル')"></div>
      <div class="cdot" id="cd-オレンジ" style="background:#FFB347" onclick="setColor('オレンジ')"></div>
      <div class="cdot" id="cd-ホワイト" style="background:#f0f0f0;border:.5px solid #ccc" onclick="setColor('ホワイト')"></div>
      <div class="cdot" id="cd-ブラック" style="background:#555" onclick="setColor('ブラック')"></div>
    </div>
  </div>
</div>

<!-- メイン -->
<div class="main">
  <div class="pnl">
    <div class="ph">
      <span id="ptitle">アイテム一覧</span>
      <span id="pcnt" style="font-size:10px;color:var(--t3)"></span>
    </div>
    <div class="isc"><div class="ig" id="grid"><div class="msg">データを読み込み中...</div></div></div>
  </div>

  <div class="prev-panel">
    <div class="ph2">
      <span>コーデプレビュー</span>
      <button class="btn bo" style="font-size:10px;padding:3px 8px" onclick="rnd()">ランダム ✦</button>
    </div>
    <div class="prev-stage" id="prev-stage">
      <div class="prev-empty">アイテムを選んで<br>コーデを作ろう♪</div>
    </div>
    <div class="pact">
      <button class="btn bo" onclick="clr()">リセット</button>
      <button class="btn bpr" onclick="showSavePopup()">保存 / 画像出力</button>
    </div>
  </div>
</div>

<!-- 保存済みコーデ -->
<div class="sv" id="svbar" style="display:none">
  <span style="font-size:11px;color:var(--t2);font-weight:500">保存したコーデ</span>
  <div id="svlist" style="display:flex;gap:5px;flex-wrap:wrap"></div>
</div>

</div><!-- .app -->

<script>
/* ================================================================
   設定
================================================================ */
const GITHUB_RAW = 'https://raw.githubusercontent.com/yuishopri-rgb/e34tgea/main/';
const MANIFEST_URL = GITHUB_RAW + 'manifest.json';

/* ================================================================
   色判定
================================================================ */
const CK = {
  'ピンク':  ['ピンク','ローズ','いちご','チェリー','ラズベリー','ベリー','コーラル','ハート'],
  'ブルー':  ['ブルー','スカイ','ネイビー','みずいろ','ソーダ','マリン','アクア'],
  'イエロー':['イエロー','ゴールド','レモン','ひまわり','サンシャイン','バナナ'],
  'グリーン':['グリーン','ミント','リーフ','モスグリーン','エメラルド','マスカット'],
  'パープル':['パープル','ラベンダー','バイオレット','ライラック','グレープ','ミッドナイト'],
  'オレンジ':['オレンジ','アンバー','ピーチ','マカロン'],
  'ホワイト':['ホワイト','ミルキー','パール','スノー','クリーム','シルバー','ウエディング','ウェディング'],
  'ブラック':['ブラック','ダーク','ゴシック','ロック'],
};
function dc(n){for(const[c,kw]of Object.entries(CK))if(kw.some(k=>n.includes(k)))return c;return 'その他';}

/* ================================================================
   CSV パーサー（共通フォーマット）
   brand,card_id,coord_name,part,img_url
================================================================ */
function parseCsv(text) {
  const lines = text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  const start = lines[0].startsWith('brand') ? 1 : 0;
  const rows = [];
  for (const line of lines.slice(start)) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur);
    if (cols.length >= 5) rows.push(cols);
  }
  return rows;
}

/* ================================================================
   状態
================================================================ */
let ALL = [];
let fSrc='all', fPart='all', fColor='', fBrand='all';
let coord = {}, saved = [];
let brands = new Set();

/* ================================================================
   GitHub Pages からデータ自動ロード
================================================================ */
async function loadData() {
  const dot = document.getElementById('load-dot');
  const txt = document.getElementById('load-txt');
  dot.className = 'dot loading';

  try {
    // manifest.json を取得
    const mRes = await fetch(MANIFEST_URL + '?t=' + Date.now());
    if (!mRes.ok) throw new Error('manifest取得失敗');
    const manifest = await mRes.json();

    const allFiles = [...manifest.files.aipri, ...manifest.files.primagi];
    let loaded = 0, total = allFiles.length;

    // 全CSVを並列fetch（404は無視）
    await Promise.all(allFiles.map(async ({file, label}) => {
      try {
        const res = await fetch(GITHUB_RAW + file + '?t=' + Date.now());
        if (!res.ok) return; // ファイルがまだない場合はスキップ
        const text = await res.text();
        const rows = parseCsv(text);
        const src = file.startsWith('data/aipri') ? 'aipri' : 'primagi';
        const existing = new Set(ALL.map(x=>x.id));
        for (const [brand, cardId, name, part, imgUrl] of rows) {
          const id = src + '_' + cardId + '_' + part;
          if (existing.has(id)) continue;
          ALL.push({id, code:cardId, name, part, src, brand, img:imgUrl, color:dc(name)});
          brands.add(brand);
        }
        loaded++;
        txt.textContent = `読み込み中... ${loaded}/${total}`;
      } catch(e) { /* スキップ */ }
    }));

    dot.className = 'dot ok';
    txt.textContent = `${ALL.length}件読み込み完了`;
    renderBrandChips();
    render();

  } catch(e) {
    dot.className = 'dot';
    txt.textContent = 'データ読み込みエラー';
    console.error(e);
    document.getElementById('grid').innerHTML = `<div class="msg">データの読み込みに失敗しました。<br>GitHubにデータを配置してください。</div>`;
  }
}

/* ================================================================
   描画
================================================================ */
function filtered() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  return ALL.filter(it => {
    if (fSrc !== 'all' && it.src !== fSrc) return false;
    if (fPart !== 'all' && it.part !== fPart) return false;
    if (fColor && it.color !== fColor) return false;
    if (fBrand !== 'all' && it.brand !== fBrand) return false;
    if (q && !it.name.toLowerCase().includes(q) && !it.code.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const list = filtered();
  document.getElementById('pcnt').textContent = list.length + '件';
  const g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = `<div class="msg">${ALL.length ? '該当なし' : 'データ読み込み中...'}</div>`;
    return;
  }
  g.innerHTML = list.map(it => {
    const sel = coord[it.part] && coord[it.part].id === it.id;
    const pl = it.part === 'アクセサリ' ? 'アクセ' : it.part;
    return `<div class="ic${sel?' sel':''}" onclick="pick('${it.id}')">
      <div class="bdg bs ${it.src==='aipri'?'bai':'bpm'}">${it.src==='aipri'?'AI':'PM'}</div>
      <div class="bdg bp b${it.part}">${pl}</div>
      ${it.img
        ? `<img src="${it.img}" alt="${it.name}" loading="lazy" onerror="this.style.opacity='.1'">`
        : `<div class="no-img">${it.code}</div>`}
      <div class="nm">${it.name}</div>
    </div>`;
  }).join('');
}

function renderPrev() {
  const s = document.getElementById('prev-stage');
  const ac=coord['アクセサリ'], op=coord['ワンピース'], tp=coord['トップス'], bt=coord['ボトムス'], sh=coord['シューズ'];
  if (!ac && !op && !tp && !bt && !sh) {
    s.innerHTML = '<div class="prev-empty">アイテムを選んで<br>コーデを作ろう♪</div>';
    return;
  }
  const slot = (it, cls, lbl) => it
    ? `<div class="pslot ${cls}">
        <div class="pslot-lbl">${lbl}</div>
        <img src="${it.img||''}" alt="${it.name}" onerror="this.style.opacity='.1'">
        <div class="pslot-name">${it.name}</div>
        <button class="rm-btn" onclick="rmSlot('${it.part}')">✕</button>
       </div>`
    : `<div class="pslot-empty ${cls}">${lbl}を選ぼう</div>`;

  s.innerHTML =
    slot(ac, 'acce', 'アクセサリ') +
    (op ? slot(op, 'onepiece', 'ワンピース')
        : slot(tp, 'tops', 'トップス') + slot(bt, 'bottoms', 'ボトムス')) +
    slot(sh, 'shoes', 'シューズ');
}

function renderBrandChips() {
  document.getElementById('brand-chips').innerHTML =
    `<div class="chip ${fBrand==='all'?'on':''}" onclick="setBrand('all')">すべて</div>` +
    [...brands].map(b =>
      `<div class="chip ${fBrand===b?'on':''}" onclick="setBrand('${b.replace(/'/g,"\\'")}')">${b}</div>`
    ).join('');
}

function renderSaved() {
  const bar = document.getElementById('svbar');
  if (!saved.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  document.getElementById('svlist').innerHTML = saved.map(s =>
    `<div class="sc2" onclick="loadSaved(${s.id})">${s.name}</div>`
  ).join('');
}

/* ================================================================
   操作
================================================================ */
function pick(id) {
  const it = ALL.find(x => x.id === id); if (!it) return;
  if (coord[it.part] && coord[it.part].id === id) { delete coord[it.part]; }
  else {
    if (it.part === 'ワンピース') { delete coord['トップス']; delete coord['ボトムス']; }
    if (it.part === 'トップス' || it.part === 'ボトムス') delete coord['ワンピース'];
    coord[it.part] = it;
  }
  render(); renderPrev();
}
function rmSlot(p) { delete coord[p]; render(); renderPrev(); }
function clr() { coord = {}; render(); renderPrev(); }
function rnd() {
  coord = {};
  const pool = filtered().length ? filtered() : ALL;
  if (pool.some(x => x.part === 'ワンピース') && Math.random() > .4) {
    const c = pool.filter(x => x.part === 'ワンピース');
    coord['ワンピース'] = c[Math.floor(Math.random() * c.length)];
  } else {
    ['トップス','ボトムス'].forEach(p => {
      const c = pool.filter(x => x.part === p);
      if (c.length) coord[p] = c[Math.floor(Math.random() * c.length)];
    });
  }
  ['シューズ','アクセサリ'].forEach(p => {
    const c = pool.filter(x => x.part === p);
    if (c.length) coord[p] = c[Math.floor(Math.random() * c.length)];
  });
  render(); renderPrev();
}

function setSrc(v){ fSrc=v; document.querySelectorAll('#sc .chip').forEach((c,i)=>c.classList.toggle('on',['all','aipri','primagi'][i]===v)); render(); }
function setPart(v){ fPart=v; document.querySelectorAll('#pc .chip').forEach((c,i)=>c.classList.toggle('on',['all','ワンピース','トップス','ボトムス','シューズ','アクセサリ'][i]===v)); render(); }
function setBrand(v){ fBrand=v; renderBrandChips(); render(); }
function setColor(v){
  fColor = fColor===v ? '' : v;
  document.querySelectorAll('.cdot').forEach(d => {
    d.classList.remove('on');
    if (d.id==='cd-'+fColor || (fColor===''&&d.id==='cd-')) d.classList.add('on');
  });
  render();
}

function loadSaved(id){ const s=saved.find(x=>x.id===id); if(!s)return; coord={...s.coord}; render(); renderPrev(); }

/* ================================================================
   保存ポップアップ
================================================================ */
// パーツ定義 [part_key, css_class, label, img_height(px), overlap_margin(px)]
const SLOT_DEFS = [
  ['アクセサリ', 'acce',     'アクセサリ', 80,  -12],
  ['ワンピース', 'onepiece', 'ワンピース', 220, -22],
  ['トップス',   'tops',     'トップス',   130, -16],
  ['ボトムス',   'bottoms',  'ボトムス',   115, -16],
  ['シューズ',   'shoes',    'シューズ',   85,   0],
];

function showSavePopup() {
  if (!Object.keys(coord).length) { alert('アイテムを選んでください'); return; }

  const overlay = document.createElement('div');
  overlay.id = 'save-overlay';
  overlay.innerHTML = `
    <div class="save-header">
      <button class="save-capture" onclick="captureCoord()">📸 画像を保存</button>
      <label class="save-toggle">
        <input type="checkbox" id="show-names" onchange="renderPopupCoord()"> パーツ名を表示
      </label>
      <button class="save-close" onclick="document.getElementById('save-overlay').remove()">✕ 閉じる</button>
    </div>
    <div id="popup-stage"></div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  renderPopupCoord();
}

function renderPopupCoord() {
  const showNames = document.getElementById('show-names')?.checked;
  const stage = document.getElementById('popup-stage');
  if (!stage) return;
  stage.innerHTML = '';

  // ワンピース or トップス+ボトムス を決定
  const slots = SLOT_DEFS.filter(([key]) => {
    if (key === 'ワンピース') return !!coord['ワンピース'];
    if (key === 'トップス')   return !coord['ワンピース'] && !!coord['トップス'];
    if (key === 'ボトムス')   return !coord['ワンピース'] && !!coord['ボトムス'];
    return !!coord[key];
  });

  slots.forEach(([key, , lbl, h, mb], i) => {
    const it = coord[key];
    if (!it) return;
    const row = document.createElement('div');
    row.className = 'popup-row';
    row.style.marginBottom = i < slots.length-1 ? mb+'px' : '0';

    const img = document.createElement('img');
    img.src = it.img || '';
    img.alt = it.name;
    img.style.cssText = `height:${h}px;width:auto;max-width:${showNames?200:280}px;object-fit:contain;`;
    img.onerror = () => { img.style.opacity = '.15'; };
    row.appendChild(img);

    if (showNames) {
      const nm = document.createElement('div');
      nm.className = 'popup-name';
      nm.innerHTML = `<div class="popup-name-lbl">${lbl}</div>${it.name}`;
      row.appendChild(nm);
    }
    stage.appendChild(row);
  });
}

async function captureCoord() {
  const stage = document.getElementById('popup-stage');
  if (!stage) return;

  const showNames = document.getElementById('show-names')?.checked;
  const SLOT_W = showNames ? 360 : 280;
  const SLOT_H_MAP = {acce:80, onepiece:220, tops:130, bottoms:115, shoes:85};
  const OVERLAP    = {acce:-12, onepiece:-22, tops:-16, bottoms:-16, shoes:0};

  // 描画対象スロットを決定
  const slots = SLOT_DEFS.filter(([key]) => {
    if (key === 'ワンピース') return !!coord['ワンピース'];
    if (key === 'トップス')   return !coord['ワンピース'] && !!coord['トップス'];
    if (key === 'ボトムス')   return !coord['ワンピース'] && !!coord['ボトムス'];
    return !!coord[key];
  });

  // 全画像をロード
  const images = await Promise.all(slots.map(([key]) => new Promise(res => {
    const it = coord[key]; if(!it||!it.img){res(null);return;}
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = () => {
      // CORSなしで再試行
      const img2 = new Image();
      img2.onload = ()=>res(img2);
      img2.onerror = ()=>res(null);
      img2.src = it.img;
    };
    img.src = it.img + (it.img.includes('?')?'&':'?') + 't=' + Date.now();
  })));

  // Canvas サイズ計算
  let totalH = slots.reduce((sum, [key,,, h, mb], i) => {
    const cls = SLOT_DEFS.find(d=>d[0]===key)[1];
    return sum + h + (i < slots.length-1 ? mb : 0);
  }, 0);

  const SCALE = 2;
  const canvas = document.createElement('canvas');
  canvas.width  = SLOT_W * SCALE;
  canvas.height = Math.max(totalH, 50) * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  // 背景
  ctx.fillStyle = '#180828';
  ctx.fillRect(0, 0, SLOT_W, totalH);

  // パーツを描画
  let y = 0;
  const IMG_W = showNames ? 200 : SLOT_W - 4;
  slots.forEach(([key, cls, lbl, h, mb], i) => {
    const img = images[i];
    if (img) {
      const ratio = Math.min(IMG_W / img.naturalWidth, h / img.naturalHeight);
      const dw = img.naturalWidth * ratio;
      const dh = img.naturalHeight * ratio;
      ctx.drawImage(img, (IMG_W - dw) / 2, y + (h - dh) / 2, dw, dh);
    }
    if (showNames) {
      ctx.fillStyle = '#F4A7C3';
      ctx.font = '10px "Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
      ctx.fillText(lbl, IMG_W + 12, y + 16);
      ctx.fillStyle = '#ffffff';
      ctx.font = '11px "Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif';
      const name = coord[key]?.name || '';
      if (name.length <= 10) {
        ctx.fillText(name, IMG_W + 12, y + 32);
      } else {
        ctx.fillText(name.slice(0, 10), IMG_W + 12, y + 32);
        ctx.fillText(name.slice(10),    IMG_W + 12, y + 48);
      }
    }
    y += h + (i < slots.length-1 ? mb : 0);
  });

  // 出力
  canvas.toBlob(async blob => {
    if (!blob) { alert('画像生成に失敗しました'); return; }
    const url = URL.createObjectURL(blob);
    // iOS Web Share API
    if (navigator.share && navigator.canShare) {
      const file = new File([blob], 'coord.png', {type:'image/png'});
      if (navigator.canShare({files:[file]})) {
        try {
          await navigator.share({files:[file], title:'ミックスコーデ'});
          URL.revokeObjectURL(url); return;
        } catch(e) {}
      }
    }
    // 通常ダウンロード
    const a = document.createElement('a');
    a.href = url; a.download = 'coord.png'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }, 'image/png');
}
